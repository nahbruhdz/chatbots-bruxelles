<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COHEA — Assistant Cheveux Bouclés</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --p1:#a0614a; --p2:#c4856b; --bg-chat:rgba(245,235,228,0.78);
  --msg-bot:rgba(255,255,255,0.7); --msg-user-a:#a0614a; --msg-user-b:#b8705a;
  --text:#5a3a2a; --text-soft:rgba(90,58,42,0.55); --border:rgba(196,133,107,0.28);
  --sug-bg:rgba(255,255,255,0.68); --sug-text:#7a4a36; --sug-border:rgba(196,133,107,0.32);
  --input-bg:rgba(255,255,255,0.68); --hdr-a:#1a0e08; --hdr-b:#2e1a10;
  --stat-color:#a0614a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f5ebe4 0%,#e8d5c8 40%,#d4b8a8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}

#chat-trigger{position:fixed;bottom:28px;right:28px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;cursor:pointer;box-shadow:0 6px 24px rgba(160,97,74,.45);display:flex;align-items:center;justify-content:center;z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);animation:trigger-pop .6s 1s cubic-bezier(.34,1.56,.64,1) both}
@keyframes trigger-pop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
#chat-trigger:hover{transform:scale(1.1) rotate(8deg)}
#chat-trigger svg{width:28px;height:28px;fill:#fff}
#notif-ring{position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(160,97,74,.45);animation:ring-pulse 2.5s infinite}
@keyframes ring-pulse{0%{transform:scale(1);opacity:.8}70%{transform:scale(1.4);opacity:0}100%{transform:scale(1.4);opacity:0}}

#chat-window{position:fixed;bottom:108px;right:28px;width:372px;max-height:600px;border-radius:26px;background:var(--bg-chat);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);border:1px solid var(--border);box-shadow:0 20px 60px rgba(120,70,50,.22),0 0 0 1px rgba(255,255,255,.38) inset;display:flex;flex-direction:column;overflow:hidden;z-index:998;opacity:0;transform:scale(.85) translateY(24px);pointer-events:none;transition:opacity .38s cubic-bezier(.34,1.56,.64,1),transform .38s cubic-bezier(.34,1.56,.64,1)}
#chat-window.open{opacity:1;transform:scale(1) translateY(0);pointer-events:all}

.chat-header{background:linear-gradient(145deg,var(--hdr-a),var(--hdr-b));padding:18px 20px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.chat-header::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--p2),transparent)}
.avatar{width:44px;height:44px;border-radius:50%;background:rgba(196,133,107,.18);border:1.5px solid rgba(196,133,107,.38);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.header-name{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:#f5e8d8;letter-spacing:.04em}
.header-sub{font-size:11px;color:rgba(245,232,216,.5);display:flex;align-items:center;gap:5px;margin-top:3px}
.status-dot{width:6px;height:6px;background:#8fc78f;border-radius:50%;animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.close-btn{margin-left:auto;background:rgba(196,133,107,.12);border:1px solid rgba(196,133,107,.22);border-radius:8px;width:30px;height:30px;cursor:pointer;color:rgba(245,232,216,.65);font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.close-btn:hover{background:rgba(196,133,107,.26)}

.chat-messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:rgba(160,97,74,.2) transparent;max-height:300px}
.msg{max-width:84%;padding:11px 15px;border-radius:20px;font-size:13.5px;line-height:1.58;opacity:0;animation:msg-in .32s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes msg-in{from{opacity:0;transform:translateY(10px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.bot{background:var(--msg-bot);border:1px solid rgba(196,133,107,.18);border-bottom-left-radius:6px;align-self:flex-start;color:var(--text);box-shadow:0 2px 10px rgba(120,70,50,.08)}
.msg.user{background:linear-gradient(135deg,var(--msg-user-a),var(--msg-user-b));color:#fff;border-bottom-right-radius:6px;align-self:flex-end;box-shadow:0 2px 14px rgba(160,97,74,.32)}

.typing{display:flex;align-items:center;gap:5px;padding:12px 16px;background:var(--msg-bot);border:1px solid rgba(196,133,107,.18);border-radius:20px;border-bottom-left-radius:6px;align-self:flex-start;max-width:72px;opacity:0;animation:msg-in .3s ease forwards}
.typing span{width:7px;height:7px;background:var(--p2);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

.suggestions{padding:8px 14px 10px;display:flex;flex-wrap:wrap;gap:6px}
.sug-btn{background:var(--sug-bg);border:1px solid var(--sug-border);border-radius:20px;padding:7px 14px;font-size:12px;font-family:'Inter',sans-serif;color:var(--sug-text);cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.sug-btn:hover{background:rgba(160,97,74,.13);border-color:var(--p1);transform:translateY(-2px);box-shadow:0 4px 12px rgba(160,97,74,.2)}
.sug-btn:active{transform:translateY(0)}

.chat-input-area{padding:10px 14px 16px;border-top:1px solid var(--border);display:flex;gap:9px;align-items:flex-end}
.chat-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:10px 15px;font-size:13px;font-family:'Inter',sans-serif;background:var(--input-bg);color:var(--text);outline:none;resize:none;max-height:80px;line-height:1.4;transition:border-color .2s,box-shadow .2s}
.chat-input:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(160,97,74,.12)}
.chat-input::placeholder{color:rgba(120,80,60,.4)}

.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 16px rgba(160,97,74,.38);transition:transform .22s cubic-bezier(.34,1.56,.64,1);animation:send-glow 3s infinite}
@keyframes send-glow{0%,100%{box-shadow:0 4px 16px rgba(160,97,74,.38)}50%{box-shadow:0 4px 26px rgba(160,97,74,.65)}}
.send-btn:hover{transform:scale(1.12)}.send-btn:active{transform:scale(.95)}
.send-btn svg{width:17px;height:17px;fill:#fff}

.stats-bar{background:rgba(160,97,74,.06);border-top:1px solid rgba(196,133,107,.14);padding:8px 14px;display:flex;justify-content:space-around}
.stat{text-align:center}
.stat-num{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--stat-color)}
.stat-label{font-size:9.5px;color:var(--text-soft);text-transform:uppercase;letter-spacing:.05em}


</style>
</head>
<body>
<button id="chat-trigger" onclick="toggleChat()">
  <div id="notif-ring"></div>
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</button>

<div id="chat-window">
  <div class="chat-header">
    <div class="avatar">🌀</div>
    <div>
      <div class="header-name">COHEA — Cheveux Bouclés</div>
      <div class="header-sub"><span class="status-dot"></span>Disponible · Saint-Gilles, Bruxelles</div>
    </div>
    <button class="close-btn" onclick="toggleChat()">✕</button>
  </div>

  <div class="chat-messages" id="messages"></div>
  <div class="suggestions" id="suggestions"></div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="s1">0</div><div class="stat-label">Clients bouclés</div></div>
    <div class="stat"><div class="stat-num" id="s2">0</div><div class="stat-label">Textures maîtrisées</div></div>
    <div class="stat"><div class="stat-num" id="s3">0</div><div class="stat-label">Ans d'expertise</div></div>
  </div>

  

  <div class="chat-input-area">
    <textarea id="chat-input" class="chat-input" rows="1" placeholder="Votre question sur vos boucles…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
</div>

<script>
const GEMINI_KEY = 'AQ.Ab8RN6JOrD5kAHas732Emx1gClfSMgPCC9TnYny0dM6kgvCVBA';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
const GROK_KEY = 'xai-8XfKzukzOVzhIqKlrCoMiiMp6UQbVtO7cb9ng6iSyKObCsDtQ5JYQgmQ9CRI0lpMNI0dPEMPYEUvvm6V';

const BUSINESS_CONTEXT = `Tu es l'assistante IA de COHEA (Conscious Hair & Appearance), salon spécialisé exclusivement en cheveux bouclés, ondulés et afro à Bruxelles (Rue de Portugal 1, 1060 Saint-Gilles).
COHEA est reconnu pour son expertise des textures naturelles — coupes personnalisées, soins hydratants deep conditioning, ateliers "coiffer ses boucles soi-même", et e-shop de produits naturels/bio (gels, crèmes coiffantes, huiles).
Pour réserver: cohea.be/reservations ou WhatsApp +32 492 75 01 96 ou email booking@cohea.be.
Ton équipe: plusieurs stylistes spécialisées boucles, ambiance inclusive et bienveillante.
Questions fréquentes des clientes: tarifs selon longueur et texture, produits recommandés pour boucles sèches, comment entretenir ses boucles entre les visites, durée du RDV, si on peut venir avec les cheveux lavés ou non.
Réponds en français, ton chaleureux et expert, maximum 2 phrases courtes + 1 emoji pertinent. Sois précise et pratique.`;

const SUGGESTION_FLOWS = {
  initial: [
    "💈 Je veux prendre RDV",
    "✂️ Quels soins pour boucles sèches ?",
    "💰 Tarifs et durée d'un RDV",
    "🌿 Produits recommandés pour mes boucles"
  ],
  afterBooking: [
    "📅 Disponibilités cette semaine",
    "🧴 Dois-je venir cheveux lavés ?",
    "⏰ Combien de temps dure la coupe ?",
    "❓ Politique d'annulation"
  ],
  afterSoins: [
    "💧 Soin hydratant deep conditioning",
    "🌀 Coupes spéciales boucles",
    "🧖 Traitement kératine naturelle",
    "💈 Prendre RDV pour ce soin"
  ],
  afterProduits: [
    "🛒 Commander en ligne",
    "🌿 Produits sans sulfates",
    "💆 Masques maison recommandés",
    "📦 Livraison disponible ?"
  ],
  afterTarifs: [
    "💈 Réserver maintenant",
    "📏 Tarif selon longueur de cheveux",
    "🎁 Offrir un soin en cadeau",
    "💳 Modes de paiement"
  ]
};

let chatHistory = [];
let conversationState = 'initial';
let chatOpen = false;

// ── AUDIO ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function initAudio() { if (!actx) actx = new AudioCtx(); }
function playSound(type) {
  initAudio();
  if (actx.state === 'suspended') actx.resume();
  const o = actx.createOscillator(), g = actx.createGain(), now = actx.currentTime;
  o.connect(g); g.connect(actx.destination); o.type = 'sine';
  if (type === 'open') {
    o.frequency.setValueAtTime(380, now); o.frequency.exponentialRampToValueAtTime(560, now+.15); o.frequency.exponentialRampToValueAtTime(680, now+.28);
    g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(.08, now+.05); g.gain.exponentialRampToValueAtTime(.001, now+.55);
  } else if (type === 'send') {
    o.frequency.setValueAtTime(540, now); o.frequency.exponentialRampToValueAtTime(680, now+.08);
    g.gain.setValueAtTime(.06, now); g.gain.exponentialRampToValueAtTime(.001, now+.15);
  } else {
    o.frequency.setValueAtTime(640, now); o.frequency.setValueAtTime(500, now+.1);
    g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(.05, now+.02); g.gain.exponentialRampToValueAtTime(.001, now+.32);
    const o2 = actx.createOscillator(), g2 = actx.createGain();
    o2.connect(g2); g2.connect(actx.destination); o2.type = 'sine'; o2.frequency.value = 800;
    g2.gain.setValueAtTime(0, now+.12); g2.gain.linearRampToValueAtTime(.03, now+.17); g2.gain.exponentialRampToValueAtTime(.001, now+.4);
    o2.start(now+.12); o2.stop(now+.45);
  }
  o.start(now); o.stop(now+.6);
}

// ── TOGGLE ──
function toggleChat() {
  const win = document.getElementById('chat-window');
  chatOpen = !chatOpen;
  win.classList.toggle('open', chatOpen);
  if (chatOpen) {
    playSound('open');
    if (chatHistory.length === 0) setTimeout(() => addBotMessage("Bonjour ! 👋 Je suis l'assistante COHEA, spécialiste des cheveux bouclés à Bruxelles. Quelle est votre question ?"), 420);
  }
}

// ── MESSAGES ──
function addBotMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg bot'; div.textContent = text;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
  playSound('receive');
  renderSuggestions();
}
function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg user'; div.textContent = text;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'typing'; div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>'; msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { document.getElementById('typing-indicator')?.remove(); }

// ── SUGGESTIONS ──
function detectState(msg) {
  const m = msg.toLowerCase();
  if (m.includes('rdv') || m.includes('réserv') || m.includes('rendez') || m.includes('appointment') || m.includes('prendre rdv') || m.includes('je veux prendre')) return 'afterBooking';
  if (m.includes('soin') || m.includes('traitement') || m.includes('hydrat') || m.includes('deep') || m.includes('kératin')) return 'afterSoins';
  if (m.includes('produit') || m.includes('shampoo') || m.includes('crème') || m.includes('gel') || m.includes('huile') || m.includes('boutique')) return 'afterProduits';
  if (m.includes('tarif') || m.includes('prix') || m.includes('coût') || m.includes('combien') || m.includes('durée')) return 'afterTarifs';
  return conversationState;
}
function renderSuggestions() {
  const sugs = SUGGESTION_FLOWS[conversationState] || SUGGESTION_FLOWS.initial;
  const c = document.getElementById('suggestions'); c.innerHTML = '';
  sugs.forEach(s => {
    const btn = document.createElement('button'); btn.className = 'sug-btn'; btn.textContent = s;
    btn.onclick = () => sendMessage(s);
    c.appendChild(btn);
  });
}

// ── SMART ROTATING FALLBACK ──
const _RC={};
const _SR={
  rdv:["Pour prendre RDV, écrivez-nous à booking@cohea.be ou réservez en ligne sur cohea.be — nous répondons sous 24h 📅","Nos créneaux partent vite, surtout le week-end ! Réservez sur cohea.be pour garantir votre place 🌀","Contactez-nous via booking@cohea.be avec vos disponibilités et le type de soin souhaité ✉️"],
  tarifs:["Nos tarifs débutent à 55€ pour une coupe courte, et varient selon la longueur et la texture 💰","La coupe bouclée complète (analyse + shampoing + masque + coupe) démarre à 75€ pour cheveux courts ✂️","Consultez la grille tarifaire complète sur cohea.be — des soins pour tous les budgets 📋"],
  produits:["Sans sulfates ni silicones : crèmes coiffantes, gels, huiles sèches — tout disponible sur notre e-shop cohea.be 🌿","Nos best-sellers : huile de jojoba pour sceller l'hydratation + gel curl-définisseur sans alcool ✨","On sélectionne uniquement des produits adaptés aux textures 2B à 4C — disponibles au salon et sur cohea.be 🌱"],
  soins:["Le deep conditioning réhydrate en profondeur en 20 min — recommandé toutes les 3-4 semaines 💧","Nous proposons aussi des soins protéinés pour les boucles fragilisées et des traitements anti-sèche 🧖","Soin signature COHEA : shampoing doux + masque + coupe curl-by-curl — durée 2h pour les longueurs 🌀"],
  default:["Quelle est votre question sur vos boucles ? Je peux vous guider sur les soins, les RDV ou les produits 💬","Posez-moi votre question — spécialiste cheveux bouclés à votre service, toutes textures confondues 🌀","Pour une réponse personnalisée : booking@cohea.be ou cohea.be — toujours disponibles pour vous 🌿"]
};

function inventerFallback(msg){
  const w=msg.toLowerCase().split(/[\s,!?]+/).filter(x=>x.length>3&&!['avec','pour','dans','vous','nous','les','des','une','est','que','comment','quand'].includes(x));
  const t=w.find(x=>x.length>4)||'votre demande';
  const N=["boucles", "texture", "hydratation", "définition", "curl"];const V=["coiffer", "traiter", "sublimer", "hydrater", "définir"];const A=["adapté à votre texture", "naturel et efficace", "personnalisé"];
  const _i=(_RC._iv=(_RC._iv||0)+1);
  const templates=[
    `Concernant ${t}, chez COHEA nous savons ${V[_i%V.length]} cela de manière ${A[_i%A.length]} ✨`,
    `Bonne question ! Notre expertise en cheveux bouclés et textures afro nous permet d'aborder ${t} avec notre approche ${A[_i%A.length]} 🌟`,
    `Pour ${t}, nous recommandons ${V[_i%V.length]} de façon ${A[_i%A.length]} — c'est notre spécialité 💬`,
    `${t.charAt(0).toUpperCase()+t.slice(1)} ? Chez COHEA, notre ${N[_i%N.length]} ${A[_i%A.length]} répond à ce besoin ✨`
  ];
  return templates[_i%templates.length];
}
function getContextualFallback(msg){
  const m=msg.toLowerCase();
  let k='default';
  if(m.includes('rdv')||m.includes('réserv')||m.includes('rendez')||m.includes('prendre'))k='rdv';
  else if(m.includes('tarif')||m.includes('prix')||m.includes('combien')||m.includes('coût'))k='tarifs';
  else if(m.includes('produit')||m.includes('crème')||m.includes('gel')||m.includes('huile'))k='produits';
  else if(m.includes('soin')||m.includes('traitement')||m.includes('deep')||m.includes('masque'))k='soins';
  if(k==='default')return inventerFallback(msg);
  _RC[k]=(_RC[k]||0);const r=_SR[k][_RC[k]%_SR[k].length];_RC[k]++;return r;
}

// ── API ──
async function callGemini() {
  const res = await fetch(GEMINI_URL, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: BUSINESS_CONTEXT }] },
      contents: chatHistory,
      generationConfig: { maxOutputTokens: 150, temperature: 0.75 }
    })
  });
  if (!res.ok) throw new Error(`${res.status}`);
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('empty');
  return text;
}

async function callGrok(userMsg) {
  const messages = [
    { role: 'system', content: BUSINESS_CONTEXT },
    ...chatHistory.slice(0, -1).map(h => ({ role: h.role === 'model' ? 'assistant' : 'user', content: h.parts[0].text })),
    { role: 'user', content: userMsg }
  ];
  const res = await fetch('https://api.x.ai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROK_KEY}` },
    body: JSON.stringify({ model: 'grok-beta', messages, max_tokens: 150 })
  });
  if (!res.ok) throw new Error(`${res.status}`);
  const data = await res.json();
  return data?.choices?.[0]?.message?.content;
}

// ── SEND ──
async function sendMessage(prefill) {
  const input = document.getElementById('chat-input');
  const text = (prefill || input.value).trim();
  if (!text) return;
  input.value = ''; autoResize(input);
  document.getElementById('suggestions').innerHTML = '';

  addUserMessage(text);
  playSound('send');
  chatHistory.push({ role: 'user', parts: [{ text }] });
  conversationState = detectState(text);
  showTyping();

  let reply = null;
  try { reply = await callGemini(); }
  catch (e1) {
    try { reply = await callGrok(text); } catch (e2) {}
  }
  removeTyping();

  if (!reply) reply = getContextualFallback(text);
  chatHistory.push({ role: 'model', parts: [{ text: reply }] });
  addBotMessage(reply);
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }

function animCounter(id, target, suffix = '') {
  const el = document.getElementById(id); let c = 0; const step = Math.ceil(target / 40);
  const t = setInterval(() => { c = Math.min(c + step, target); el.textContent = c + suffix; if (c >= target) clearInterval(t); }, 40);
}
window.addEventListener('load', () => { animCounter('s1', 500, '+'); animCounter('s2', 3); animCounter('s3', 10, '+'); renderSuggestions(); });
</script>
</body>
