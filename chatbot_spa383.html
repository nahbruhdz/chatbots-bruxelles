<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spa 383 Brussels — Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--p1:#4fc3c8;--p2:#6edbe0;--bg-chat:rgba(16,26,38,.86);--msg-bot:rgba(255,255,255,.058);--border:rgba(79,195,200,.22);--text:rgba(200,232,235,.9);--text-soft:rgba(79,195,200,.45);--sug-bg:rgba(79,195,200,.1);--sug-text:#4fc3c8;--sug-border:rgba(79,195,200,.28);--input-bg:rgba(255,255,255,.05);--hdr-a:#0c1824;--hdr-b:#122030;--stat-color:#4fc3c8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0c1824 0%,#122030 50%,#0a1620 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}

#chat-trigger{position:fixed;bottom:28px;right:28px;width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;cursor:pointer;box-shadow:0 6px 28px rgba(79,195,200,.48);display:flex;align-items:center;justify-content:center;z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);animation:trigger-pop .6s 1s cubic-bezier(.34,1.56,.64,1) both}
@keyframes trigger-pop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
#chat-trigger:hover{transform:scale(1.1) rotate(6deg)}
#chat-trigger svg{width:27px;height:27px;fill:#0c1824}
#notif-ring{position:absolute;inset:-5px;border-radius:18px;border:2px solid rgba(79,195,200,.42);animation:ring-pulse 2.5s infinite}
@keyframes ring-pulse{0%{transform:scale(1);opacity:.8}70%{transform:scale(1.35);opacity:0}100%{transform:scale(1.35);opacity:0}}

#chat-window{position:fixed;bottom:108px;right:28px;width:372px;max-height:610px;border-radius:24px;background:var(--bg-chat);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);border:1px solid var(--border);box-shadow:0 24px 72px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04) inset;display:flex;flex-direction:column;overflow:hidden;z-index:998;opacity:0;transform:scale(.86) translateY(24px);pointer-events:none;transition:opacity .38s cubic-bezier(.34,1.56,.64,1),transform .38s cubic-bezier(.34,1.56,.64,1)}
#chat-window.open{opacity:1;transform:scale(1) translateY(0);pointer-events:all}

.chat-header{background:linear-gradient(145deg,var(--hdr-a),var(--hdr-b));border-bottom:1px solid var(--border);padding:18px 20px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.chat-header::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--p1),var(--p2),var(--p1),transparent)}
.avatar{width:44px;height:44px;border-radius:14px;background:rgba(79,195,200,.15);border:1px solid rgba(79,195,200,.38);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.header-name{font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:var(--p1);letter-spacing:.04em}
.header-sub{font-size:11px;color:var(--text-soft);display:flex;align-items:center;gap:5px;margin-top:3px}
.status-dot{width:6px;height:6px;background:#4caf50;border-radius:50%;animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.close-btn{margin-left:auto;background:rgba(79,195,200,.1);border:1px solid rgba(79,195,200,.24);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--p1);font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.close-btn:hover{background:rgba(79,195,200,.24)}

.chat-messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:rgba(79,195,200,.2) transparent;max-height:305px}
.msg{max-width:84%;padding:11px 15px;border-radius:18px;font-size:13.5px;line-height:1.58;opacity:0;animation:msg-slide .32s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes msg-slide{from{opacity:0;transform:translateX(-12px) scale(.96)}to{opacity:1;transform:translateX(0) scale(1)}}
.msg.bot{background:var(--msg-bot);border:1px solid var(--border);border-bottom-left-radius:6px;align-self:flex-start;color:var(--text);box-shadow:0 2px 12px rgba(0,0,0,.3)}
.msg.user{background:linear-gradient(135deg,var(--p1),var(--p2));color:#0c1824;font-weight:600;border-bottom-right-radius:6px;align-self:flex-end;box-shadow:0 2px 16px rgba(79,195,200,.38);animation:msg-slide-r .32s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes msg-slide-r{from{opacity:0;transform:translateX(12px) scale(.96)}to{opacity:1;transform:translateX(0) scale(1)}}

.typing{display:flex;align-items:center;gap:5px;padding:12px 16px;background:var(--msg-bot);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:6px;align-self:flex-start;max-width:72px;opacity:0;animation:msg-slide .3s ease forwards}
.typing span{width:7px;height:7px;background:var(--p1);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

.suggestions{padding:8px 14px 10px;display:flex;flex-wrap:wrap;gap:6px}
.sug-btn{background:var(--sug-bg);border:1px solid var(--sug-border);border-radius:20px;padding:7px 14px;font-size:12px;font-family:'Inter',sans-serif;color:var(--sug-text);cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.sug-btn:hover{background:rgba(79,195,200,.22);border-color:rgba(79,195,200,.55);transform:translateY(-2px);box-shadow:0 4px 14px rgba(79,195,200,.25)}

.chat-input-area{padding:10px 14px 16px;border-top:1px solid var(--border);display:flex;gap:9px;align-items:flex-end}
.chat-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:10px 15px;font-size:13px;font-family:'Inter',sans-serif;background:var(--input-bg);color:var(--text);outline:none;resize:none;max-height:80px;line-height:1.4;transition:border-color .2s,box-shadow .2s}
.chat-input:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(79,195,200,.14)}
.chat-input::placeholder{color:rgba(79,195,200,.3)}

.send-btn{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 16px rgba(79,195,200,.42);transition:transform .22s cubic-bezier(.34,1.56,.64,1);animation:send-glow 3s infinite}
@keyframes send-glow{0%,100%{box-shadow:0 4px 16px rgba(79,195,200,.42)}50%{box-shadow:0 4px 28px rgba(79,195,200,.72)}}
.send-btn:hover{transform:scale(1.1)}.send-btn:active{transform:scale(.95)}
.send-btn svg{width:17px;height:17px;fill:#0c1824}

.stats-bar{background:rgba(79,195,200,.05);border-top:1px solid var(--border);padding:8px 14px;display:flex;justify-content:space-around}
.stat{text-align:center}
.stat-num{font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:var(--stat-color)}
.stat-label{font-size:9.5px;color:var(--text-soft);text-transform:uppercase;letter-spacing:.06em}


</style>
</head>
<body>
<button id="chat-trigger" onclick="toggleChat()">
  <div id="notif-ring"></div>
  <svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
</button>

<div id="chat-window">
  <div class="chat-header">
    <div class="avatar">♨️</div>
    <div>
      <div class="header-name">SPA 383 Brussels</div>
      <div class="header-sub"><span class="status-dot"></span>Concierge bien-être · 24h/24</div>

    <button class="close-btn" onclick="toggleChat()">✕</button>

  <div class="chat-messages" id="messages"></div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="s1">0</div><div class="stat-label">Soins / mois</div></div>
    <div class="stat"><div class="stat-num" id="s2">0</div><div class="stat-label">Types de massages</div></div>
    <div class="stat"><div class="stat-num" id="s3">0</div><div class="stat-label">Cabines privées</div></div>
  </div>

  

  <div class="chat-input-area">
    <textarea id="chat-input" class="chat-input" rows="1" placeholder="Posez votre question…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
</div>

<script>
const GEMINI_KEY='AQ.Ab8RN6JOrD5kAHas732Emx1gClfSMgPCC9TnYny0dM6kgvCVBA';
const GEMINI_URL=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
const GROK_KEY='xai-8XfKzukzOVzhIqKlrCoMiiMp6UQbVtO7cb9ng6iSyKObCsDtQ5JYQgmQ9CRI0lpMNI0dPEMPYEUvvm6V';

const BUSINESS_CONTEXT=`Tu es l'assistant IA de Spa 383, spa premium à Bruxelles.
Site: spa383.be | Email: contact@spa383.be | WhatsApp: +32 479 685 686
Services: massages relaxants, deep tissue, aux pierres chaudes (basalt), drainage lymphatique, massages balinais, soins du corps, soins visage, accès espace aqua-thermal (jacuzzi, sauna, hammam), soins en duo pour couples.
Questions fréquentes: accès journée aqua-thermal (disponible en formule), durée minimum (1h), si on peut venir à deux (oui, espaces communs et cabines duo), tenues fournies (peignoir et serviette inclus), si enfants autorisés (non, 18+ uniquement).
Réservation: spa383.be ou WhatsApp +32 479 685 686 ou contact@spa383.be.
Réponds en français, ton premium et serein, maximum 2 phrases + 1 emoji. Vouvoie le client.`;

const SUGGESTION_FLOWS={
  initial:["💆 Réserver un massage ou soin","🌊 Accès espace aqua-thermal","💑 Forfait duo pour deux","💰 Quels sont vos tarifs ?"],
  afterBooking:["📅 Disponibilités cette semaine","🛁 Peignoir et serviette inclus ?","⏰ Combien de temps dure la visite ?","❓ Politique d'annulation"],
  afterAqua:["♨️ Sauna, hammam et jacuzzi inclus ?","🏊 Durée de l'accès aqua","💆 Combiner avec un massage","🎟️ Tarif accès journée"],
  afterDuo:["🥂 Forfait romantique couple","🎁 Bon cadeau duo","💑 Cabine privatisée pour deux ?","📅 Réserver pour deux"],
  afterTarifs:["💎 Forfait premium tout inclus","🎟️ Accès aqua seul","👐 Massage 60 ou 90 minutes ?","🌟 Soin signature Spa 383"]
};

let chatHistory=[],conversationState='initial';
const AudioCtx=window.AudioContext||window.webkitAudioContext;let actx;
function initAudio(){if(!actx)actx=new AudioCtx();}
function playSound(type){
  initAudio();if(actx.state==='suspended')actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(),now=actx.currentTime;
  o.connect(g);g.connect(actx.destination);o.type='sine';
  if(type==='open'){o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(450,now+.15);o.frequency.exponentialRampToValueAtTime(600,now+.3);g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.075,now+.05);g.gain.exponentialRampToValueAtTime(.001,now+.6);}
  else if(type==='send'){o.frequency.setValueAtTime(500,now);g.gain.setValueAtTime(.06,now);g.gain.exponentialRampToValueAtTime(.001,now+.14);}
  else{o.frequency.setValueAtTime(580,now);o.frequency.setValueAtTime(440,now+.1);g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.05,now+.03);g.gain.exponentialRampToValueAtTime(.001,now+.35);}
  o.start(now);o.stop(now+.65);
}
function toggleChat(){const win=document.getElementById('chat-window');const open=win.classList.toggle('open');if(open){playSound('open');if(chatHistory.length===0)setTimeout(()=>addBotMessage("Bienvenue au Spa 383 Bruxelles ♨️ Votre havre de paix. Comment puis-je vous aider à planifier votre visite ?"),420);}else{}}
function addBotMessage(text){const msgs=document.getElementById('messages');const div=document.createElement('div');div.className='msg bot';div.textContent=text;msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;playSound('receive');renderSuggestions();}
function addUserMessage(text){const msgs=document.getElementById('messages');const div=document.createElement('div');div.className='msg user';div.textContent=text;msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function showTyping(){const msgs=document.getElementById('messages');const div=document.createElement('div');div.className='typing';div.id='typing-indicator';div.innerHTML='<span></span><span></span><span></span>';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function removeTyping(){document.getElementById('typing-indicator')?.remove();}

function detectState(msg){
  const m=msg.toLowerCase();
  if(m.includes('réserv')||m.includes('rdv')||m.includes('massage')&&m.includes('prendre'))return 'afterBooking';
  if(m.includes('aqua')||m.includes('sauna')||m.includes('jacuzzi')||m.includes('hammam'))return 'afterAqua';
  if(m.includes('couple')||m.includes('duo')||m.includes('deux')||m.includes('romantique'))return 'afterDuo';
  if(m.includes('tarif')||m.includes('prix')||m.includes('combien')||m.includes('coût'))return 'afterTarifs';
  return conversationState;
}
function renderSuggestions(){const sugs=SUGGESTION_FLOWS[conversationState]||SUGGESTION_FLOWS.initial;const c=document.getElementById('suggestions');c.innerHTML='';sugs.forEach(s=>{const btn=document.createElement('button');btn.className='sug-btn';btn.textContent=s;btn.onclick=()=>sendMessage(s);c.appendChild(btn);});}

function inventerFallback(msg){
  const w=msg.toLowerCase().split(/[\s,!?]+/).filter(x=>x.length>3&&!['avec','pour','dans','vous','nous','les','des','une','est','que','comment','quand'].includes(x));
  const t=w.find(x=>x.length>4)||'votre demande';
  const N=["soin", "circuit thermal", "bien-être", "relaxation", "rituel"];const V=["revitaliser", "détendre", "purifier", "ressourcer", "régénérer"];const A=["apaisant", "thermal", "personnalisé"];
  const _i=(_RC._iv=(_RC._iv||0)+1);
  const templates=[
    `Concernant ${t}, chez Spa383 nous savons ${V[_i%V.length]} cela de manière ${A[_i%A.length]} ✨`,
    `Bonne question ! Notre expertise en soins aqua-thermaux nous permet d'aborder ${t} avec notre approche ${A[_i%A.length]} 🌟`,
    `Pour ${t}, nous recommandons ${V[_i%V.length]} de façon ${A[_i%A.length]} — c'est notre spécialité 💬`,
    `${t.charAt(0).toUpperCase()+t.slice(1)} ? Chez Spa383, notre ${N[_i%N.length]} ${A[_i%A.length]} répond à ce besoin ✨`
  ];
  return templates[_i%templates.length];
}
function getContextualFallback(msg){
  const m=msg.toLowerCase();
  const _RC=window._RC_spa383||(window._RC_spa383={});
  const _SR={
    rdv:["Réservez votre accès spa sur spa383.be — créneaux 2h et 3h disponibles 7j/7 📅","Réservez au moins 48h à l'avance sur spa383.be pour garantir votre créneau ✨","Contact : contact@spa383.be — on vous trouve le créneau idéal 🌊"],
    tarifs:["Accès solo aqua-thermal : 45€/2h — duo : 80€ 💰","Formule signature : aqua 3h + massage 60 min à 120€/pers 🌊","Tarif groupe (4+) disponible — contact@spa383.be pour devis 📋"],
    aqua:["Jacuzzi, hammam, sauna finlandais, bassin chaud/froid — parcours 2h minimum 🌊","Circuit : chaleur sèche → vapeur → chaud/froid → relaxation — nos équipes vous guident ✨","Privatisation possible en soirée pour groupes — EVJF, anniversaires 🎉"],
    duo:["Rituel duo : aqua-thermal + massage côte à côte en cabine privée 💕","Formule romantique : bain à remous privatisé + massage aux huiles (2x60 min) 🌹","Réservez 72h à l'avance sur spa383.be — disponibilité limitée ✨"],
    default:["Bienvenue chez Spa383 — aqua-thermal, massages, soins à Bruxelles 🌊","Infos : contact@spa383.be ou spa383.be 📧","Que souhaitez-vous savoir ? Soins, aqua, tarifs ? ✨"]
  };
  let k='default';
  if(m.includes('réserv')||m.includes('rdv')||m.includes('rendez'))k='rdv';
  else if(m.includes('tarif')||m.includes('prix')||m.includes('combien'))k='tarifs';
  else if(m.includes('aqua')||m.includes('thermal')||m.includes('sauna')||m.includes('jacuzzi')||m.includes('hammam'))k='aqua';
  else if(m.includes('duo')||m.includes('couple')||m.includes('deux'))k='duo';
  if(k==='default')return inventerFallback(msg);
  _RC[k]=(_RC[k]||0);const r=_SR[k][_RC[k]%_SR[k].length];_RC[k]++;return r;
}

async function callGemini(){const res=await fetch(GEMINI_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:BUSINESS_CONTEXT}]},contents:chatHistory,generationConfig:{maxOutputTokens:150,temperature:.75}})});if(!res.ok)throw new Error(`${res.status}`);const data=await res.json();const text=data?.candidates?.[0]?.content?.parts?.[0]?.text;if(!text)throw new Error('empty');return text;}
async function callGrok(userMsg){const messages=[{role:'system',content:BUSINESS_CONTEXT},...chatHistory.slice(0,-1).map(h=>({role:h.role==='model'?'assistant':'user',content:h.parts[0].text})),{role:'user',content:userMsg}];const res=await fetch('https://api.x.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROK_KEY}`},body:JSON.stringify({model:'grok-beta',messages,max_tokens:150})});if(!res.ok)throw new Error(`${res.status}`);const data=await res.json();return data?.choices?.[0]?.message?.content;}

async function sendMessage(prefill){
  const input=document.getElementById('chat-input');const text=(prefill||input.value).trim();if(!text)return;
  input.value='';autoResize(input);document.getElementById('suggestions').innerHTML='';
  addUserMessage(text);playSound('send');chatHistory.push({role:'user',parts:[{text}]});conversationState=detectState(text);showTyping();
  let reply=null;try{reply=await callGemini();}catch(e1){try{reply=await callGrok(text);}catch(e2){}}
  removeTyping();if(!reply)reply=getContextualFallback(text);
  chatHistory.push({role:'model',parts:[{text:reply}]});addBotMessage(reply);
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';}
function animCounter(id,target,suffix=''){const el=document.getElementById(id);let c=0;const step=Math.ceil(target/40);const t=setInterval(()=>{c=Math.min(c+step,target);el.textContent=c+suffix;if(c>=target)clearInterval(t);},40);}
window.addEventListener('load',()=>{animCounter('s1',220,'+');animCounter('s2',14,'+');animCounter('s3',6);renderSuggestions();});
</script>
</body>
</html>
