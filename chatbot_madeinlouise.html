<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f0f5ec 0%,#e2ede0 40%,#cce0c8 100%);min-height:100vh}

#nr{position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(90,122,90,.38);animation:rpulse 2.5s infinite}

#cw{position:fixed;bottom:108px;right:28px;width:372px;max-height:590px;border-radius:26px;background:var(--bg);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);border:1px solid var(--brd);box-shadow:0 20px 60px rgba(40,70,40,.2),0 0 0 1px rgba(255,255,255,.4) inset;display:flex;flex-direction:column;overflow:hidden;z-index:998;opacity:0;transform:scale(.85) translateY(24px);pointer-events:none;transition:opacity .38s cubic-bezier(.34,1.56,.64,1),transform .38s cubic-bezier(.34,1.56,.64,1)}

function inventer(msg){
  const w=msg.toLowerCase().split(/[\s,!?]+/).filter(x=>x.length>3&&!['avec','pour','dans','vous','nous','les','des','une','est','que','comment','quand','quel','quelle'].includes(x));
