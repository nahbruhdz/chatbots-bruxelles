<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogalife Brussels — Assistant IA</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--p1:#6b4e8a;--p2:#9b7dc0;--ac:#d4a8e8;--bg:rgba(248,242,255,.82);--bot:rgba(255,255,255,.76);--brd:rgba(107,78,138,.2);--txt:#2a1a3a;--soft:rgba(60,40,80,.5);--sug:rgba(255,255,255,.72);--sug-t:#4a2a6a;--ha:#1e0f2e;--hb:#140820}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f5edff 0%,#e8daff 40%,#d4c4f0 100%);min-height:100vh}
#ct{position:fixed;bottom:28px;right:28px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;cursor:pointer;box-shadow:0 6px 24px rgba(107,78,138,.42);display:flex;align-items:center;justify-content:center;z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);animation:tpop .6s 1.2s both}
@keyframes tpop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
#ct:hover{transform:scale(1.1) rotate(-8deg)}
#ct svg{width:28px;height:28px;fill:#fff}
#nr{position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(155,125,192,.4);animation:rpulse 2.5s infinite}
@keyframes rpulse{0%{transform:scale(1);opacity:.8}70%{transform:scale(1.4);opacity:0}100%{transform:scale(1.4);opacity:0}}
#cw{position:fixed;bottom:108px;right:28px;width:372px;max-height:590px;border-radius:26px;background:var(--bg);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border:1px solid var(--brd);box-shadow:0 20px 60px rgba(60,30,100,.22),0 0 0 1px rgba(255,255,255,.42) inset;display:flex;flex-direction:column;overflow:hidden;z-index:998;opacity:0;transform:scale(.85) translateY(24px);pointer-events:none;transition:opacity .38s cubic-bezier(.34,1.56,.64,1),transform .38s cubic-bezier(.34,1.56,.64,1)}
#cw.open{opacity:1;transform:scale(1) translateY(0);pointer-events:all}
.hdr{background:linear-gradient(145deg,var(--ha),var(--hb));padding:18px 20px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-20px;right:-10px;width:80px;height:80px;background:radial-gradient(circle,rgba(212,168,232,.12),transparent 70%)}
.hdr::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ac),transparent)}
.av{width:44px;height:44px;border-radius:50%;background:rgba(155,125,192,.12);border:1.5px solid rgba(155,125,192,.28);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.hn{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#e8daff;letter-spacing:.05em}
.hs{font-size:10.5px;color:rgba(232,218,255,.42);display:flex;align-items:center;gap:5px;margin-top:3px}
.sd{width:6px;height:6px;background:#a8e8a8;border-radius:50%;animation:sdp 2s infinite}
@keyframes sdp{0%,100%{opacity:1}50%{opacity:.4}}
.cb{margin-left:auto;background:rgba(155,125,192,.1);border:1px solid rgba(155,125,192,.22);border-radius:8px;width:30px;height:30px;cursor:pointer;color:rgba(232,218,255,.55);font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.cb:hover{background:rgba(155,125,192,.25)}
.msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:rgba(107,78,138,.15) transparent;max-height:300px}
.m{max-width:84%;padding:11px 15px;border-radius:20px;font-size:13.5px;line-height:1.58;opacity:0;animation:min .32s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes min{from{opacity:0;transform:translateY(10px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.m.b{background:var(--bot);border:1px solid var(--brd);border-bottom-left-radius:6px;align-self:flex-start;color:var(--txt);box-shadow:0 2px 10px rgba(60,30,100,.07)}
.m.u{background:linear-gradient(135deg,var(--p1),var(--p2));color:#f0e8ff;border-bottom-right-radius:6px;align-self:flex-end;box-shadow:0 2px 14px rgba(107,78,138,.3)}
.typ{display:flex;align-items:center;gap:5px;padding:12px 16px;background:var(--bot);border:1px solid var(--brd);border-radius:20px;border-bottom-left-radius:6px;align-self:flex-start;max-width:72px;opacity:0;animation:min .3s ease forwards}
.typ span{width:7px;height:7px;background:var(--p2);border-radius:50%;animation:bn 1.2s infinite}
.typ span:nth-child(2){animation-delay:.2s}.typ span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
.sugs{padding:8px 14px 10px;display:flex;flex-wrap:wrap;gap:6px}
.sb{background:var(--sug);border:1px solid rgba(107,78,138,.22);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--sug-t);cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.sb:hover{background:rgba(107,78,138,.08);border-color:var(--p1);transform:translateY(-2px);box-shadow:0 4px 12px rgba(107,78,138,.16)}
.stats{background:rgba(107,78,138,.04);border-top:1px solid rgba(107,78,138,.12);padding:8px 14px;display:flex;justify-content:space-around}
.sn{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:var(--p1);text-align:center}
.sl{font-size:9.5px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;text-align:center}
.inp{padding:10px 14px 16px;border-top:1px solid var(--brd);display:flex;gap:9px;align-items:flex-end}
textarea{flex:1;border:1px solid var(--brd);border-radius:20px;padding:10px 15px;font-size:13px;font-family:'Inter',sans-serif;background:rgba(255,255,255,.72);color:var(--txt);outline:none;resize:none;max-height:80px;line-height:1.4;transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(107,78,138,.1)}
textarea::placeholder{color:rgba(60,30,100,.35)}
.snd{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .22s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 16px rgba(107,78,138,.3);animation:sg 3s infinite}
@keyframes sg{0%,100%{box-shadow:0 4px 16px rgba(107,78,138,.3)}50%{box-shadow:0 4px 26px rgba(107,78,138,.55)}}
.snd:hover{transform:scale(1.12)}.snd:active{transform:scale(.95)}
.snd svg{width:17px;height:17px;fill:#fff}
</style>
</head>
<body>
<button id="ct" onclick="toggleChat()">
  <div id="nr"></div>
  <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 100 10A5 5 0 0012 2zM12 14c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
</button>
<div id="cw">
  <div class="hdr">
    <div class="av">🧘</div>
    <div><div class="hn">Yogalife Brussels</div><div class="hs"><span class="sd"></span>Studio yoga & méditation · Bruxelles</div></div>
    <button class="cb" onclick="toggleChat()">✕</button>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="sugs" id="sugs"></div>
  <div class="stats">
    <div><div class="sn" id="s1">0</div><div class="sl">Cours/semaine</div></div>
    <div><div class="sn" id="s2">0</div><div class="sl">Instructeurs</div></div>
    <div><div class="sn" id="s3">0</div><div class="sl">Styles de yoga</div></div>
  </div>
  <div class="inp">
    <textarea id="ti" rows="1" placeholder="Votre question sur le yoga…" onkeydown="hk(event)" oninput="ar(this)"></textarea>
    <button class="snd" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
</div>
<script>
const GK='AQ.Ab8RN6JOrD5kAHas732Emx1gClfSMgPCC9TnYny0dM6kgvCVBA';
const GU=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GK}`;
const XK='xai-8XfKzukzOVzhIqKlrCoMiiMp6UQbVtO7cb9ng6iSyKObCsDtQ5JYQgmQ9CRI0lpMNI0dPEMPYEUvvm6V';
const CTX=`Tu es l'assistante IA de Yogalife Brussels, studio de yoga et méditation à Bruxelles. Yogalife propose des cours de vinyasa, hatha, yin yoga, yoga prénatal, méditation et pranayama pour tous les niveaux. Studio principal : chaussée de Waterloo, Ixelles. Site : yogalife.org. Email : info@yogalife.org. Tél : +32 493 811 813. Abonnements mensuels et cours à l'unité disponibles. Premier cours d'essai offert. Réponds en français, ton calme, inspirant et accessible. Max 2 phrases + 1 emoji. Sois précise et pratique.`;
const SF={
  initial:["🧘 Cours pour débutants absolus","✨ Différence vinyasa vs hatha ?","💰 Tarifs et abonnements","📅 Planning des cours cette semaine"],
  afterRDV:["🆕 Cours d'essai gratuit ?","⏰ À quelle heure arriver ?","🧘 Tapis fourni ou à apporter ?","📋 S'inscrire en ligne ou sur place ?"],
  afterCours:["🌙 Yin yoga — qu'est-ce que c'est ?","🤰 Yoga prénatal — à partir de quand ?","🧠 Méditation guidée pour débutants","🌅 Cours du matin disponibles ?"],
  afterTarifs:["💳 Abonnement sans engagement ?","🎁 Offrir un cours en cadeau","📦 Pack 10 séances disponible ?","💈 Commencer maintenant"],
  afterYoga:["🌸 Yoga yin vs yoga restauratif ?","🧘 Méditation vs pranayama ?","💆 Yoga thérapeutique disponible ?","🌿 Retraites yoga organisées ?"]
};
let H=[],state='initial',open=false;
const _RC={};
const _SR={
  rdv:["Inscrivez-vous à votre premier cours sur yogalife.org — le cours d'essai est offert pour tous les nouveaux 🧘","Planning en temps réel sur yogalife.org — plus de 30 cours par semaine à choisir 📅","Contactez-nous à info@yogalife.org pour réserver une place ou poser vos questions ✨"],
  tarifs:["Cours à l'unité : 18€ — abonnement mensuel illimité : 89€/mois sans engagement 💰","Pack découverte : 3 cours pour 45€ valable 1 mois — idéal pour commencer 🌿","Premier cours d'essai offert — venez découvrir notre studio sans aucune obligation ✨"],
  cours:["Vinyasa (dynamique), hatha (équilibre), yin yoga (étirements profonds), méditation — tous accessibles aux débutants 🧘","Cours du matin de 7h à 9h, midi de 12h à 13h30, soir de 18h à 20h30 — planning complet sur yogalife.org 🌅","Yin yoga le jeudi soir 19h30 — parfait pour relâcher les tensions de la semaine 🌙"],
  vinyasa:["Le vinyasa est un yoga dynamique qui enchaîne les postures en rythme avec la respiration — tonifiant et méditatif 🌊","Notre vinyasa matin (7h30) est une vraie bulle d'énergie — accessible dès quelques séances de pratique ✨","Différence clé : vinyasa = flow et mouvement, hatha = postures maintenues plus longtemps 🧘"],
  meditation:["Nous proposons des séances de méditation guidée (20-45 min) et de pranayama chaque semaine 🧠","Méditation pour débutants chaque mardi à 12h15 — aucun matériel nécessaire, juste vous ✨","La méditation pleine conscience aide à réduire le stress et améliore la concentration dès les premières séances 🌿"],
  default:["Namaste ! Je suis votre guide chez Yogalife — cours, tarifs, planning, posez vos questions 🧘","Découvrez notre univers sur yogalife.org — yoga et méditation pour tous à Bruxelles ✨","Pour infos : info@yogalife.org ou +32 493 811 813 📧"]
};
function inventer(msg){
  const w=msg.toLowerCase().split(/[\s,!?]+/).filter(x=>x.length>3&&!['avec','pour','dans','vous','nous','les','des','une','est','que','comment','quand','quel','quelle'].includes(x));
  const t=w.find(x=>x.length>4)||'votre demande';
  const nouns=["posture", "séance", "pratique", "respiration", "alignement"];
  const verbs=["pratiquer", "progresser", "méditer", "équilibrer", "explorer"];
  const adj=["accessible à tous", "progressif", "inspirant"];
  const rn=nouns[_RC._i1%nouns.length];const rv=verbs[_RC._i2%verbs.length];const ra=adj[_RC._i3%adj.length];
  _RC._i1=(_RC._i1||0)+1;_RC._i2=(_RC._i2||0)+1;_RC._i3=(_RC._i3||0)+1;
  const templates=[
    `Concernant ${t}, chez Yogalife nous savons ${rv} cela de façon ${ra} — consultez-nous pour une réponse sur mesure ✨`,
    `Bonne question ! Notre expertise en yoga et méditation nous permet d'aborder ${t} avec notre ${rn} ${ra} 🌟`,
    `Pour ${t}, nous recommandons une approche ${ra} basée sur notre expérience en yoga et méditation 💬`,
    `${t.charAt(0).toUpperCase()+t.slice(1)} est quelque chose que nous traitons régulièrement — notre équipe Yogalife vous guidera avec notre ${rn} ${ra} ✨`
  ];
  const idx=((_RC._iv||0)%templates.length);_RC._iv=(_RC._iv||0)+1;
  return templates[idx];
}
function rot(k){_RC[k]=(_RC[k]||0);const r=_SR[k][_RC[k]%_SR[k].length];_RC[k]++;return r;}
function A(){const C=window.AudioContext||window.webkitAudioContext;if(!A._c)A._c=new C();return A._c;}
function snd(t){try{const c=A();if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain(),n=c.currentTime;o.connect(g);g.connect(c.destination);o.type='triangle';if(t==='o'){o.frequency.setValueAtTime(280,n);o.frequency.exponentialRampToValueAtTime(440,n+.22);g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(.06,n+.08);g.gain.exponentialRampToValueAtTime(.001,n+.8);}else if(t==='s'){o.frequency.setValueAtTime(440,n);o.frequency.exponentialRampToValueAtTime(560,n+.1);g.gain.setValueAtTime(.045,n);g.gain.exponentialRampToValueAtTime(.001,n+.2);}else{o.frequency.setValueAtTime(528,n);o.frequency.exponentialRampToValueAtTime(396,n+.18);g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(.04,n+.03);g.gain.exponentialRampToValueAtTime(.001,n+.45);}o.start(n);o.stop(n+.85);}catch(e){}}
function toggleChat(){const w=document.getElementById('cw');open=!open;w.classList.toggle('open',open);if(open){snd('o');if(H.length===0)setTimeout(()=>bot("Namaste ! 🧘 Bienvenue chez Yogalife Brussels. Je suis votre guide pour trouver le cours parfait. Comment puis-je vous aider ?"),420);}}
function bot(t){const d=document.getElementById('msgs');const el=document.createElement('div');el.className='m b';el.textContent=t;d.appendChild(el);d.scrollTop=d.scrollHeight;snd('r');sugs();}
function usr(t){const d=document.getElementById('msgs');const el=document.createElement('div');el.className='m u';el.textContent=t;d.appendChild(el);d.scrollTop=d.scrollHeight;}
function showTyp(){const d=document.getElementById('msgs');const el=document.createElement('div');el.className='typ';el.id='ty';el.innerHTML='<span></span><span></span><span></span>';d.appendChild(el);d.scrollTop=d.scrollHeight;}
function rmTyp(){document.getElementById('ty')?.remove();}
function dst(m){const v=m.toLowerCase();if(v.includes('rdv')||v.includes('réserv')||v.includes('inscrire')||v.includes('essai'))return 'afterRDV';if(v.includes('vinyasa')||v.includes('hatha')||v.includes('flow')||v.includes('difference'))return 'afterYoga';if(v.includes('tarif')||v.includes('prix')||v.includes('abonnem')||v.includes('combien'))return 'afterTarifs';if(v.includes('méditat')||v.includes('pranaya')||v.includes('yin')||v.includes('cours')||v.includes('planning')||v.includes('horaire'))return 'afterCours';return state;}
function smrt(m){const v=m.toLowerCase();if(v.includes('réserv')||v.includes('inscrire')||v.includes('essai'))return rot('rdv');if(v.includes('tarif')||v.includes('prix')||v.includes('combien')||v.includes('abonnem'))return rot('tarifs');if(v.includes('vinyasa')||v.includes('hatha'))return rot('vinyasa');if(v.includes('méditat')||v.includes('pranaya'))return rot('meditation');if(v.includes('cours')||v.includes('planning')||v.includes('horaire'))return rot('cours');return inventer(msg);}
function sugs(){const s=SF[state]||SF.initial;const c=document.getElementById('sugs');c.innerHTML='';s.forEach(t=>{const b=document.createElement('button');b.className='sb';b.textContent=t;b.onclick=()=>send(t);c.appendChild(b);});}
async function send(p){const ti=document.getElementById('ti');const txt=(p||ti.value).trim();if(!txt)return;ti.value='';ar(ti);document.getElementById('sugs').innerHTML='';usr(txt);snd('s');H.push({role:'user',parts:[{text:txt}]});state=dst(txt);showTyp();
let r=null;
try{const rs=await fetch(GU,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:CTX}]},contents:H,generationConfig:{maxOutputTokens:150,temperature:.8}})});if(!rs.ok)throw 0;const d=await rs.json();r=d?.candidates?.[0]?.content?.parts?.[0]?.text||null;}catch(e){}
if(!r){try{const ms=[{role:'system',content:CTX},...H.slice(0,-1).map(h=>({role:h.role==='model'?'assistant':'user',content:h.parts[0].text})),{role:'user',content:txt}];const rs=await fetch('https://api.x.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${XK}`},body:JSON.stringify({model:'grok-beta',messages:ms,max_tokens:150})});if(!rs.ok)throw 0;const d=await rs.json();r=d?.choices?.[0]?.message?.content||null;}catch(e){}}
if(!r)r=smrt(txt);
rmTyp();H.push({role:'model',parts:[{text:r}]});bot(r);}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';}
function cnt(id,t,s=''){const el=document.getElementById(id);let c=0;const st=Math.ceil(t/40);const tm=setInterval(()=>{c=Math.min(c+st,t);el.textContent=c+s;if(c>=t)clearInterval(tm);},40);}
window.addEventListener('load',()=>{cnt('s1',35,'+');cnt('s2',8);cnt('s3',7);sugs();});
</script>
</body>
</html>
